<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <meta name="mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <title>シューティングゲーム</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; }

    body, html {
      margin: 0; padding: 0;
      overflow: hidden; height: 100%;
      font-family: Arial, sans-serif;
      touch-action: none;
      -webkit-tap-highlight-color: transparent;
      user-select: none; -webkit-user-select: none;
    }

    body.stage-1 { background: linear-gradient(180deg,#87CEEB 0%,#98D8C8 100%); }
    body.stage-2 { background: linear-gradient(180deg,#FFF8DC 0%,#87CEEB 60%,#90EE90 100%); }
    body.stage-3 { background: linear-gradient(180deg,#0a0a2e 0%,#1a1a4e 50%,#0d0d1a 100%); }
    body.stage-4 { background: linear-gradient(180deg,#FFE4E1 0%,#FFB6C1 50%,#87CEEB 100%); }
    body.stage-5 { background: linear-gradient(180deg,#000 0%,#0a0a1a 40%,#1a0a0a 100%); }

    body.stage-3::before, body.stage-5::before {
      content:''; position:fixed; inset:0;
      background-image:
        radial-gradient(1px 1px at 10% 15%,white,transparent),
        radial-gradient(1px 1px at 25% 40%,white,transparent),
        radial-gradient(1px 1px at 40% 10%,white,transparent),
        radial-gradient(1px 1px at 55% 60%,white,transparent),
        radial-gradient(1px 1px at 70% 25%,white,transparent),
        radial-gradient(1px 1px at 85% 50%,white,transparent),
        radial-gradient(1px 1px at 15% 75%,white,transparent),
        radial-gradient(1px 1px at 60% 80%,white,transparent),
        radial-gradient(2px 2px at 45% 35%,rgba(255,255,200,.8),transparent),
        radial-gradient(2px 2px at 80% 70%,rgba(255,255,200,.8),transparent);
      pointer-events:none; z-index:0;
    }

    #game {
      position:relative; width:100vw; height:100vh;
      overflow:hidden; z-index:1;
    }

    /* HUD */
    #hud {
      position:absolute; top:0; left:0; right:0;
      padding:8px 12px; display:flex; align-items:center; gap:10px;
      z-index:10; background:rgba(0,0,0,.3);
    }
    #score { font-size:18px; color:white; text-shadow:1px 1px 3px #000; min-width:90px; }
    #stage-display { font-size:16px; font-weight:bold; color:#FFD700; text-shadow:1px 1px 3px #000; min-width:80px; }
    #progress-bar-wrap {
      flex:1; height:12px; background:rgba(255,255,255,.2);
      border-radius:6px; overflow:hidden; border:1px solid rgba(255,255,255,.4);
    }
    #progress-bar {
      height:100%; width:0%;
      background:linear-gradient(90deg,#00ff88,#00ccff);
      border-radius:6px; transition:width .3s ease;
    }

    /* ボスHP */
    #boss-hp-wrap {
      position:absolute; top:52px; left:50%; transform:translateX(-50%);
      width:80%; z-index:10; text-align:center; display:none;
    }
    #boss-hp-label { color:#ff4444; font-size:13px; font-weight:bold; text-shadow:0 0 6px red; margin-bottom:3px; }
    #boss-hp-bar-bg {
      height:16px; background:rgba(0,0,0,.5); border-radius:8px;
      border:2px solid #ff4444; overflow:hidden; box-shadow:0 0 10px rgba(255,0,0,.5);
    }
    #boss-hp-bar { height:100%; width:100%; background:linear-gradient(90deg,#ff0000,#ff6600); border-radius:8px; transition:width .2s ease; }

    /* ターゲット */
    .target {
      position:absolute; cursor:pointer;
      display:flex; align-items:center; justify-content:center;
      line-height:1;
    }
    .target.hit { animation:hitAnim .8s forwards; pointer-events:none; }
    @keyframes hitAnim {
      0%   { transform:scale(1.3); opacity:1; }
      100% { transform:translateY(200px) scale(.3) rotate(360deg); opacity:0; }
    }

    /* ボス */
    .boss {
      position:absolute; cursor:pointer;
      display:flex; flex-direction:column; align-items:center; justify-content:center;
      animation:bossFly 3s ease-in-out infinite alternate;
      filter:drop-shadow(0 0 20px rgba(255,80,0,.8));
    }
    @keyframes bossFly { from{transform:translateY(0)} to{transform:translateY(30px)} }
    .boss.boss-hit { animation:bossFlash .15s; }
    @keyframes bossFlash {
      0%  { filter:drop-shadow(0 0 20px rgba(255,80,0,.8)) brightness(1); }
      50% { filter:drop-shadow(0 0 30px white) brightness(3); }
      100%{ filter:drop-shadow(0 0 20px rgba(255,80,0,.8)) brightness(1); }
    }
    .boss-emoji { font-size:100px; line-height:1; }
    .boss-label { color:#ff6600; font-size:13px; font-weight:bold; text-shadow:0 0 8px red; margin-top:4px; }

    /* ステージクリア */
    #stage-clear {
      position:fixed; inset:0; display:none;
      align-items:center; justify-content:center; z-index:100;
      background:rgba(0,0,0,.4);
    }
    #stage-clear.show { display:flex; animation:fadeInOut 2.2s forwards; }
    @keyframes fadeInOut { 0%{opacity:0} 15%{opacity:1} 75%{opacity:1} 100%{opacity:0} }
    #stage-clear-text {
      font-size:52px; font-weight:bold; color:#FFD700;
      text-shadow:0 0 20px #FFD700,2px 2px 4px black;
      animation:popIn .4s cubic-bezier(.34,1.56,.64,1) forwards;
      text-align:center; padding:0 16px;
    }
    @keyframes popIn { from{transform:scale(.3);opacity:0} to{transform:scale(1);opacity:1} }

    /* ボスアテンション */
    #boss-attention {
      position:fixed; inset:0; display:none;
      align-items:center; justify-content:center; z-index:200;
      background:rgba(0,0,0,.8);
    }
    #boss-attention.show { display:flex; }
    #boss-attention-inner { text-align:center; animation:attPulse .5s ease-in-out infinite alternate; }
    @keyframes attPulse { from{transform:scale(1)} to{transform:scale(1.04)} }
    #boss-attention-icon { font-size:80px; filter:drop-shadow(0 0 20px red); }
    #boss-attention-title { font-size:40px; font-weight:bold; color:#ff2222; text-shadow:0 0 20px red; margin:6px 0; }
    #boss-attention-msg  { font-size:22px; color:#FFD700; text-shadow:0 0 10px #FFD700; margin:6px 0; }
    #boss-attention-sub  { font-size:16px; color:#ff8888; margin-top:6px; }

    /* ゲームクリア */
    #game-clear {
      position:fixed; inset:0; display:none;
      align-items:center; justify-content:center; z-index:300;
      background:radial-gradient(ellipse at center,rgba(20,20,60,.95),rgba(0,0,0,.98));
    }
    #game-clear.show { display:flex; }
    #game-clear-inner { text-align:center; animation:clearAnim 1s cubic-bezier(.34,1.56,.64,1) forwards; }
    @keyframes clearAnim { from{transform:scale(.5);opacity:0} to{transform:scale(1);opacity:1} }
    #game-clear-icon  { font-size:80px; animation:spin 3s linear infinite; }
    @keyframes spin { from{transform:rotate(0)} to{transform:rotate(360deg)} }
    #game-clear-title { font-size:56px; font-weight:bold; color:#FFD700; text-shadow:0 0 30px #FFD700; margin:12px 0; }
    #game-clear-score { font-size:22px; color:white; margin-bottom:20px; }
    #restart-btn {
      padding:14px 32px; font-size:20px;
      background:linear-gradient(135deg,#FFD700,#FF8C00);
      border:none; border-radius:30px; cursor:pointer;
      font-weight:bold; color:#1a1a1a;
      box-shadow:0 4px 20px rgba(255,200,0,.5);
    }

    /* 爆発 */
    .explosion {
      position:absolute; pointer-events:none; font-size:40px;
      animation:explode .6s forwards; z-index:50;
    }
    @keyframes explode { 0%{transform:scale(.5);opacity:1} 100%{transform:scale(2.5);opacity:0} }

    /* スマホ追加調整 */
    @media (max-width:480px) {
      #score       { font-size:14px; min-width:72px; }
      #stage-display{ font-size:13px; min-width:64px; }
      .boss-emoji  { font-size:72px; }
      #stage-clear-text { font-size:36px; }
      #boss-attention-title { font-size:30px; }
      #boss-attention-msg   { font-size:18px; }
      #game-clear-title { font-size:40px; }
    }
  </style>
</head>
<body class="stage-1">
  <div id="game">
    <div id="hud">
      <div id="score">スコア: 0</div>
      <div id="stage-display">ステージ 1</div>
      <div id="progress-bar-wrap"><div id="progress-bar"></div></div>
    </div>
    <div id="boss-hp-wrap">
      <div id="boss-hp-label">BOSS HP</div>
      <div id="boss-hp-bar-bg"><div id="boss-hp-bar"></div></div>
    </div>
  </div>

  <div id="stage-clear"><div id="stage-clear-text"></div></div>

  <div id="boss-attention">
    <div id="boss-attention-inner">
      <div id="boss-attention-icon">🛸</div>
      <div id="boss-attention-title">⚠️ WARNING ⚠️</div>
      <div id="boss-attention-msg">最終ボス「ダース・スター」出現！！</div>
      <div id="boss-attention-sub">全弾を集中攻撃せよ！</div>
    </div>
  </div>

  <div id="game-clear">
    <div id="game-clear-inner">
      <div id="game-clear-icon">🏆</div>
      <div id="game-clear-title">GAME CLEAR!</div>
      <div id="game-clear-score"></div>
      <button id="restart-btn" onclick="location.reload()">もう一度プレイ</button>
    </div>
  </div>

  <audio id="hitSound" src="hit.mp3" preload="auto"></audio>

  <script>
  // ===== ステージ設定 =====
  const STAGES = [
    { stage:1, name:"鳥の群れ",   emoji:"🐦", bgClass:"stage-1", targetCount:10, spawnInterval:1200, size:[60,130], speed:[2,5],   useImage:true,  floatUp:false, clearText:"ステージ1 クリア！" },
    { stage:2, name:"紙飛行機",   emoji:"✈️", bgClass:"stage-2", targetCount:15, spawnInterval:900,  size:[55,110], speed:[3,7],   useImage:false, floatUp:false, clearText:"ステージ2 クリア！" },
    { stage:3, name:"インベーダー",emoji:"👾", bgClass:"stage-3", targetCount:20, spawnInterval:700,  size:[55,100], speed:[2,6],   useImage:false, floatUp:false, clearText:"ステージ3 クリア！" },
    { stage:4, name:"風船",       emoji:"🎈", bgClass:"stage-4", targetCount:20, spawnInterval:800,  size:[60,110], speed:[1.5,4], useImage:false, floatUp:true,  clearText:"ステージ4 クリア！" },
    { stage:5, name:"最終ボス",   emoji:"🛸", bgClass:"stage-5", isBoss:true, bossMaxHp:80, clearText:"🎉 GAME CLEAR! 🎉" },
  ];

  let score = 0, currentStageIndex = 0, stageKills = 0;
  let spawnIntervalId = null, bossHp = 0, bossEl = null, gameOver = false;
  let audioCtx = null;

  const game        = document.getElementById("game");
  const scoreEl     = document.getElementById("score");
  const stageDisp   = document.getElementById("stage-display");
  const progressBar = document.getElementById("progress-bar");
  const hitSound    = document.getElementById("hitSound");

  // AudioContext は最初のタップ後に生成
  function getAudio() {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    if (audioCtx.state === "suspended") audioCtx.resume();
    return audioCtx;
  }

  // ===== サウンド =====
  function playHit() {
    try { const s = hitSound.cloneNode(); s.volume = 0.6; s.play(); } catch(e){}
  }

  function beep(freq, dur, delay, type) {
    try {
      const ctx = getAudio();
      const osc = ctx.createOscillator(), gain = ctx.createGain();
      osc.connect(gain); gain.connect(ctx.destination);
      osc.type = type || "sawtooth";
      osc.frequency.setValueAtTime(freq, ctx.currentTime + delay);
      gain.gain.setValueAtTime(0.35, ctx.currentTime + delay);
      gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + delay + dur);
      osc.start(ctx.currentTime + delay);
      osc.stop(ctx.currentTime + delay + dur + 0.01);
    } catch(e) {}
  }

  function playBossAppear() {
    [[60,.5,0],[55,.5,.1],[110,.8,.5],[80,1,.8],[200,.3,1.5],[150,.3,1.7],[100,.5,1.9]]
      .forEach(([f,d,t]) => beep(f, d, t));
  }

  function playBossHit() { beep(300, .15, 0, "square"); }

  function playGameClear() {
    [261,329,392,523,659,784,1046].forEach((f,i) => beep(f, .4, i*.12, "triangle"));
  }

  // ===== タップ/クリック両対応 =====
  function addTap(el, fn) {
    let touched = false;
    el.addEventListener("touchstart", (e) => {
      e.preventDefault(); touched = true;
      getAudio(); fn(e);
    }, { passive: false });
    el.addEventListener("click", (e) => {
      if (touched) { touched = false; return; }
      fn(e);
    });
  }

  // ===== HUD =====
  function updateHUD() {
    const st = STAGES[currentStageIndex];
    scoreEl.textContent = "スコア: " + score;
    stageDisp.textContent = "ステージ " + st.stage;
    if (!st.isBoss) {
      progressBar.style.width = Math.min(100, (stageKills / st.targetCount) * 100) + "%";
    }
  }

  // ===== 爆発 =====
  function spawnExplosion(x, y) {
    const el = document.createElement("div");
    el.className = "explosion"; el.textContent = "💥";
    el.style.left = (x - 24) + "px"; el.style.top = (y - 24) + "px";
    game.appendChild(el);
    setTimeout(() => el.remove(), 700);
  }

  // ===== ターゲット生成 =====
  function spawnTarget() {
    if (gameOver) return;
    const st = STAGES[currentStageIndex];
    if (st.isBoss) return;

    const isMobile = window.innerWidth <= 600;
    const scale = isMobile ? 1.5 : 1;
    const size = (st.size[0] + Math.random() * (st.size[1] - st.size[0])) * scale;

    const el = document.createElement("div");
    el.className = "target";
    el.style.width = size + "px";
    el.style.height = size + "px";
    el.style.fontSize = size + "px";

    if (st.useImage) {
      const img = document.createElement("img");
      img.src = "bird.gif";
      img.style.cssText = "width:100%;height:100%;pointer-events:none;";
      el.appendChild(img);
      el.style.fontSize = "0";
    } else {
      el.textContent = st.emoji;
    }

    let posX, posY, flyInterval;

    if (st.floatUp) {
      posX = 40 + Math.random() * (window.innerWidth - size - 80);
      posY = window.innerHeight + size;
      el.style.left = posX + "px"; el.style.top = posY + "px";
      game.appendChild(el);
      const speedX = (Math.random() - 0.5) * 2;
      const speedY = 1.5 + Math.random() * 2;
      let angle = Math.random() * Math.PI * 2;
      flyInterval = setInterval(() => {
        if (el.classList.contains("hit")) return;
        angle += 0.03; posX += speedX + Math.sin(angle) * 1.2; posY -= speedY;
        el.style.left = posX + "px"; el.style.top = posY + "px";
        if (posY < -size) { clearInterval(flyInterval); el.remove(); }
      }, 20);
    } else {
      posX = window.innerWidth + size;
      posY = 60 + Math.random() * (window.innerHeight - 160);
      el.style.left = posX + "px"; el.style.top = posY + "px";
      game.appendChild(el);
      const speed = st.speed[0] + Math.random() * (st.speed[1] - st.speed[0]);
      const waveH = 10 + Math.random() * 25;
      let angle = Math.random() * Math.PI * 2;
      flyInterval = setInterval(() => {
        if (el.classList.contains("hit")) return;
        posX -= speed; angle += 0.08;
        el.style.left = posX + "px";
        el.style.top  = (posY + Math.sin(angle) * waveH) + "px";
        if (posX < -size) { clearInterval(flyInterval); el.remove(); }
      }, 20);
    }

    addTap(el, () => {
      if (el.classList.contains("hit") || gameOver) return;
      el.classList.add("hit"); clearInterval(flyInterval);
      const r = el.getBoundingClientRect();
      spawnExplosion(r.left + r.width / 2, r.top + r.height / 2);
      playHit(); score++; stageKills++; updateHUD();
      setTimeout(() => el.remove(), 800);
      if (stageKills >= st.targetCount) {
        stageKills = 0;
        showStageClear(st.clearText, nextStage);
      }
    });
  }

  // ===== ボス =====
  function spawnBoss() {
    const st = STAGES[currentStageIndex];
    bossHp = st.bossMaxHp;
    document.getElementById("boss-hp-wrap").style.display = "block";
    updateBossHpBar();

    bossEl = document.createElement("div");
    bossEl.className = "boss";

    const shipEl = document.createElement("div");
    shipEl.className = "boss-emoji"; shipEl.textContent = "🛸";
    const labelEl = document.createElement("div");
    labelEl.className = "boss-label"; labelEl.textContent = "DARTH STAR";
    bossEl.appendChild(shipEl); bossEl.appendChild(labelEl);

    bossEl.style.cssText = "top:30%;left:50%;transform:translate(-50%,-50%)";
    game.appendChild(bossEl);

    let bossX = window.innerWidth / 2, dir = 1;
    const mv = setInterval(() => {
      if (gameOver || !bossEl) { clearInterval(mv); return; }
      bossX += dir * 0.8;
      if (bossX > window.innerWidth - 80) dir = -1;
      if (bossX < 80) dir = 1;
      bossEl.style.left = bossX + "px";
    }, 20);

    addTap(bossEl, () => {
      if (gameOver) return;
      bossHp--; updateBossHpBar(); playBossHit();
      bossEl.classList.remove("boss-hit"); void bossEl.offsetWidth; bossEl.classList.add("boss-hit");
      spawnExplosion(parseFloat(bossEl.style.left), window.innerHeight * 0.3 + 40);
      score++; scoreEl.textContent = "スコア: " + score;

      if (bossHp <= 0) {
        gameOver = true; clearInterval(mv);
        for (let i = 0; i < 10; i++) {
          setTimeout(() => spawnExplosion(
            parseFloat(bossEl.style.left) + (Math.random() - 0.5) * 160,
            window.innerHeight * 0.3 + (Math.random() - 0.5) * 120
          ), i * 140);
        }
        setTimeout(() => {
          if (bossEl) bossEl.remove();
          document.getElementById("boss-hp-wrap").style.display = "none";
          playGameClear(); showGameClear();
        }, 1500);
      }
    });
  }

  function updateBossHpBar() {
    const pct = Math.max(0, (bossHp / STAGES[currentStageIndex].bossMaxHp) * 100);
    document.getElementById("boss-hp-bar").style.width = pct + "%";
  }

  // ===== ステージクリア演出 =====
  function showStageClear(text, cb) {
    if (spawnIntervalId) { clearInterval(spawnIntervalId); spawnIntervalId = null; }
    document.querySelectorAll(".target").forEach(t => t.remove());
    const el = document.getElementById("stage-clear");
    document.getElementById("stage-clear-text").textContent = text;
    el.className = "show";
    setTimeout(() => { el.className = ""; cb(); }, 2200);
  }

  // ===== 次ステージ =====
  function nextStage() {
    currentStageIndex++;
    if (currentStageIndex >= STAGES.length) return;
    const st = STAGES[currentStageIndex];
    document.body.className = st.bgClass;
    progressBar.style.width = "0%";
    updateHUD();
    if (st.isBoss) startBossStage();
    else spawnIntervalId = setInterval(spawnTarget, st.spawnInterval);
  }

  function startBossStage() {
    const att = document.getElementById("boss-attention");
    att.className = "show"; playBossAppear();
    setTimeout(() => { att.className = ""; spawnBoss(); }, 4000);
  }

  function showGameClear() {
    document.getElementById("game-clear-score").textContent = "最終スコア: " + score;
    document.getElementById("game-clear").className = "show";
  }

  // ===== ゲーム開始 =====
  document.body.className = STAGES[0].bgClass;
  updateHUD();
  spawnIntervalId = setInterval(spawnTarget, STAGES[0].spawnInterval);
  </script>
</body>
</html>
